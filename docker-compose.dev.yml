services:
  api:
    build: !reset null
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -c "pip install uv && uv pip install --system . &&
             alembic upgrade head &&
             uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"
    volumes:
      - ./apps/api:/app
    environment:
      ENV: dev

  web:
    build: !reset null
    image: oven/bun:1
    working_dir: /app
    command: sh -c "bun install && bun run dev --host 0.0.0.0"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
